# ===========================================================================
# Base compose — production-shaped topology. Dev conveniences are layered via
# docker-compose.override.yml (auto-merged by `docker compose`).
#
# Services: db (Postgres), redis, web (Gunicorn), worker (Celery),
#           beat (Celery Beat), nginx (edge).
# Health checks gate startup order so dependents wait for readiness.
# ===========================================================================

x-app-env: &app-env
  env_file: .env

x-app-build: &app-build
  build:
    context: .
    dockerfile: deploy/docker/Dockerfile
    args:
      REQUIREMENTS: prod

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nextora}
      POSTGRES_USER: ${POSTGRES_USER:-nextora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nextora}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nextora}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  web:
    <<: [*app-build, *app-env]
    command: ["web"]
    volumes:
      - staticfiles:/app/staticfiles
      - mediafiles:/app/mediafiles
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz/live/"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    <<: [*app-build, *app-env]
    command: ["worker"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    <<: [*app-build, *app-env]
    command: ["beat"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/app/staticfiles:ro
      - mediafiles:/app/mediafiles:ro
    ports:
      - "80:80"
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  staticfiles:
  mediafiles:
