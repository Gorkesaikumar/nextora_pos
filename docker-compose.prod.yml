version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-nextora}
      POSTGRES_USER: ${DATABASE_USER:-nextora}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-nextora}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-nextora} -d ${DATABASE_NAME:-nextora}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  web:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - DATABASE_URL=postgres://${DATABASE_USER:-nextora}:${DATABASE_PASSWORD:-nextora}@db:5432/${DATABASE_NAME:-nextora}
      - REDIS_URL=redis://redis:6379/0
      - CHANNELS_REDIS_URL=redis://redis:6379/4
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  nginx:
    image: nginx:alpine
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    ports:
      - "80:80"
    depends_on:
      - web
    restart: always

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
