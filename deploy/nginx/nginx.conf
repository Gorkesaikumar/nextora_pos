# ===========================================================================
# Nginx — edge reverse proxy for Nextora POS.
# Responsibilities: TLS termination, static/media, compression, request limits,
# security headers, request-id injection, and proxying HTTP + WebSockets to the
# Daphne ASGI app. App servers never serve files or terminate TLS themselves.
# ===========================================================================

upstream nextora_app {
    server web:8000;
    keepalive 32;
}

# Generate a request id if the client didn't supply one; it is forwarded to
# Django (RequestIDMiddleware) and tied into structured logs end to end.
map $http_x_request_id $request_id_final {
    default   $http_x_request_id;
    ""        $request_id;
}

# WebSocket upgrade handshake: echo "upgrade" back as the Connection header when
# the client requests an Upgrade, otherwise allow the connection to close. Used
# by the /ws/ location to proxy Channels/Daphne WebSockets.
map $http_upgrade $connection_upgrade {
    default   upgrade;
    ""        close;
}

log_format json_combined escape=json '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"request":"$request",'
    '"status":$status,'
    '"bytes":$body_bytes_sent,'
    '"referer":"$http_referer",'
    '"user_agent":"$http_user_agent",'
    '"request_id":"$request_id_final",'
    '"upstream_time":"$upstream_response_time"'
'}';

server {
    listen 80;
    server_name _;

    # --- Hardening ---------------------------------------------------------
    client_max_body_size 20m;          # cap uploads (receipts, logos, imports)
    server_tokens off;                 # don't leak nginx version

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # --- Compression -------------------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # --- Static & media (served directly; never hit the app) ---------------
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/mediafiles/;
        expires 7d;
        access_log off;
    }

    # --- Health probes (no access-log noise) -------------------------------
    location /healthz/ {
        access_log off;
        proxy_pass http://nextora_app;
        proxy_set_header Host $host;
    }

    # --- WebSockets (KDS live updates → Channels/Daphne) -------------------
    # Separate from `location /` because that block sends `Connection ""` for
    # upstream keepalive, which would strip the upgrade. `/ws/` is a longer
    # prefix so it wins for WebSocket routes. Origin is passed through untouched
    # so Channels' AllowedHostsOriginValidator can validate it.
    location /ws/ {
        proxy_pass http://nextora_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id_final;
        proxy_read_timeout 3600s;   # keep long-lived sockets open
        proxy_send_timeout 3600s;
    }

    # --- Application -------------------------------------------------------
    location / {
        proxy_pass http://nextora_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Lets Django's SECURE_PROXY_SSL_HEADER know the original scheme.
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id_final;
        proxy_read_timeout 30s;
    }

    # --- TLS (enable in production; terminate here) ------------------------
    # listen 443 ssl http2;
    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
}
