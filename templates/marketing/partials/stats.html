{% load humanize %}
<section class="border-y border-slate-200 bg-white py-12 md:py-16">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-10">
      <h2 class="text-sm font-bold tracking-widest text-slate-400 uppercase">Trusted by ambitious restaurants nationwide</h2>
    </div>
    
    <div class="grid grid-cols-2 md:grid-cols-4 gap-8 text-center divide-x divide-slate-100">
      <div class="px-4">
        <p class="text-4xl font-extrabold text-slate-900 mb-2">{{ tenant_count|intcomma|default:"0" }}</p>
        <p class="text-sm font-medium text-slate-500">Restaurants</p>
      </div>
      <div class="px-4">
        <p class="text-4xl font-extrabold text-slate-900 mb-2">{{ order_count|intcomma|default:"0" }}</p>
        <p class="text-sm font-medium text-slate-500">Orders Processed</p>
      </div>
      <div class="px-4">
        <p class="text-4xl font-extrabold text-slate-900 mb-2">99.9%</p>
        <p class="text-sm font-medium text-slate-500">System Uptime</p>
      </div>
      <div class="px-4">
        <p class="text-4xl font-extrabold text-slate-900 mb-2">4.9/5</p>
        <p class="text-sm font-medium text-slate-500">Customer Satisfaction</p>
      </div>
    </div>
  </div>
</section>
