<div x-data="{ 
       show: false, 
       type: '{{ type|default:'info' }}', 
       init() {
         setTimeout(() => this.show = true, 50);
         setTimeout(() => this.show = false, {{ duration|default:3000 }});
       }
     }"
     x-show="show"
     class="flex items-center gap-3 p-4 mb-3 rounded-card shadow-[0_4px_12px_rgba(0,0,0,0.1)] border"
     :class="{
       'bg-neutral-0 border-neutral-200 text-neutral-800 dark:bg-neutral-dark-100 dark:border-neutral-dark-200 dark:text-neutral-dark-800': type === 'info',
       'bg-semantic-success-subtle border-semantic-success text-semantic-success-dark dark:bg-semantic-success-subtle-dark dark:border-semantic-success-dark dark:text-semantic-success': type === 'success',
       'bg-semantic-warning-subtle border-semantic-warning text-semantic-warning-dark dark:bg-semantic-warning-subtle-dark dark:border-semantic-warning-dark dark:text-semantic-warning': type === 'warning',
       'bg-semantic-danger-subtle border-semantic-danger text-semantic-danger-dark dark:bg-semantic-danger-subtle-dark dark:border-semantic-danger-dark dark:text-semantic-danger': type === 'error'
     }"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0 translate-y-2 sm:translate-y-0 sm:translate-x-2"
     x-transition:enter-end="opacity-100 translate-y-0 sm:translate-x-0"
     x-transition:leave="transition ease-in duration-100"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     style="display: none;">
     
  <!-- Icon based on type -->
  <div class="flex-shrink-0">
    <template x-if="type === 'success'">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    </template>
    <template x-if="type === 'error'">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    </template>
    <template x-if="type === 'warning'">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
    </template>
    <template x-if="type === 'info'">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    </template>
  </div>

  <div class="flex-1 text-body-strong">
    {{ message }}
  </div>

  <button @click="show = false" class="flex-shrink-0 ml-4 focus:outline-none opacity-50 hover:opacity-100 transition-opacity">
    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
  </button>
</div>
