<div x-data="{ open: false }" 
     @open-modal.window="if ($event.detail.id === '{{ modal_id }}') open = true" 
     @close-modal.window="if ($event.detail.id === '{{ modal_id }}') open = false"
     x-show="open" 
     style="display: none;"
     class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 transition-opacity duration-deliberate"
     x-transition:enter="ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0">
     
  <!-- Modal Panel -->
  <div @click.away="open = false"
       @keydown.escape.window="open = false"
       class="bg-neutral-0 dark:bg-neutral-dark-100 rounded-card shadow-overlay max-w-md w-full overflow-hidden transition-transform duration-deliberate"
       x-transition:enter="ease-out duration-300"
       x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
       x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
       x-transition:leave="ease-in duration-200"
       x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
       x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95">
    
    <div class="px-6 py-4 border-b border-neutral-150 dark:border-neutral-dark-150 flex justify-between items-center">
      <h3 class="text-heading-1 text-neutral-900 dark:text-neutral-dark-900">{{ title|default:'Modal Title' }}</h3>
      <button @click="open = false" class="text-neutral-400 hover:text-neutral-600 dark:hover:text-neutral-dark-600 focus:outline-none">
        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>
    
    <div class="px-6 py-6">
      {% block modal_body %}{% endblock %}
    </div>
    
    <div class="px-6 py-4 bg-neutral-50 dark:bg-neutral-dark-50 border-t border-neutral-150 dark:border-neutral-dark-150 flex justify-end gap-3">
      {% block modal_footer %}
        <button @click="open = false" class="btn-ghost">Cancel</button>
      {% endblock %}
    </div>
  </div>
</div>
