<!-- PWA Update Prompt (Alpine.js) -->
<div x-data="pwaUpdatePrompt()"
     x-show="showPrompt"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0 translate-y-10"
     x-transition:enter-end="opacity-100 translate-y-0"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100 translate-y-0"
     x-transition:leave-end="opacity-0 translate-y-10"
     class="fixed bottom-6 right-6 w-80 bg-white dark:bg-neutral-dark-100 rounded-card shadow-overlay border border-neutral-200 dark:border-neutral-dark-200 p-4 z-[100] flex flex-col gap-3"
     style="display: none;">
  
  <div class="flex items-start justify-between gap-3">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-semantic-info-subtle dark:bg-semantic-info-subtle-dark flex items-center justify-center shrink-0">
        <svg class="w-6 h-6 text-semantic-info dark:text-semantic-info-dark" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
        </svg>
      </div>
      <div>
        <h4 class="text-heading-3 font-semibold text-neutral-900 dark:text-neutral-dark-900">Update Available</h4>
        <p class="text-caption text-neutral-500 dark:text-neutral-dark-500 mt-0.5">A new version of Nextora POS is ready.</p>
      </div>
    </div>
  </div>

  <div class="flex gap-2 w-full mt-1">
    <button @click="dismiss()" class="flex-1 bg-white dark:bg-neutral-dark-100 hover:bg-neutral-50 dark:hover:bg-neutral-dark-150 text-neutral-700 dark:text-neutral-dark-700 border border-neutral-200 dark:border-neutral-dark-200 font-semibold py-2 px-3 rounded-pill transition-colors text-sm">
      Later
    </button>
    <button @click="update()" class="flex-1 bg-brand-default hover:bg-brand-hover text-brand-on-brand font-semibold py-2 px-3 rounded-pill transition-colors text-sm">
      Refresh App
    </button>
  </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('pwaUpdatePrompt', () => ({
    showPrompt: false,
    registration: null,
    
    init() {
      if (!('serviceWorker' in navigator)) return;
      
      navigator.serviceWorker.getRegistration().then(reg => {
        if (!reg) return;
        this.registration = reg;
        
        // If there is already a waiting worker, show prompt
        if (reg.waiting) {
          this.showPrompt = true;
        }
        
        // Listen for new updates
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          if (!newWorker) return;
          
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              this.showPrompt = true;
            }
          });
        });

        // POS tablets remain open 24/7. Poll for new deployments hourly.
        setInterval(() => {
          reg.update();
        }, 60 * 60 * 1000);
      });

      // Reload when the new worker takes over
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) {
          refreshing = true;
          window.location.reload();
        }
      });
    },
    
    update() {
      if (this.registration && this.registration.waiting) {
        this.registration.waiting.postMessage({ type: 'SKIP_WAITING' });
      }
    },
    
    dismiss() {
      this.showPrompt = false;
    }
  }));
});
</script>
