<!-- PWA Install Prompt (Alpine.js) -->
<div x-data="pwaInstallPrompt()"
     x-show="showPrompt"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0 translate-y-10"
     x-transition:enter-end="opacity-100 translate-y-0"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100 translate-y-0"
     x-transition:leave-end="opacity-0 translate-y-10"
     class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-3rem)] max-w-sm bg-white dark:bg-neutral-dark-100 rounded-card shadow-overlay border border-neutral-200 dark:border-neutral-dark-200 p-4 z-[100] flex flex-col gap-3"
     style="display: none;">
  
  <div class="flex items-start justify-between gap-3">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-brand-subtle flex items-center justify-center shrink-0">
        <svg class="w-6 h-6 text-brand-default" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
        </svg>
      </div>
      <div>
        <h4 class="text-heading-3 font-semibold text-neutral-900 dark:text-neutral-dark-900">Install Nextora POS</h4>
        <p class="text-caption text-neutral-500 dark:text-neutral-dark-500 mt-1">Install Nextora POS on your device for:</p>
        <ul class="text-caption text-neutral-600 dark:text-neutral-dark-600 mt-1 ml-4 list-disc space-y-0.5">
          <li>Faster access</li>
          <li>Full-screen experience</li>
          <li>Better tablet support</li>
          <li>Better restaurant workflow</li>
        </ul>
      </div>
    </div>
    <button @click="dismiss()" class="text-neutral-400 hover:text-neutral-700 dark:hover:text-neutral-dark-700 transition-colors shrink-0">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>
  </div>

  <div x-show="!isIOS" class="flex gap-2 w-full mt-1">
    <button @click="dismiss()" class="flex-1 bg-white dark:bg-neutral-dark-100 hover:bg-neutral-50 dark:hover:bg-neutral-dark-150 text-neutral-700 dark:text-neutral-dark-700 border border-neutral-200 dark:border-neutral-dark-200 font-semibold py-2 px-3 rounded-pill transition-colors text-sm">
      Maybe Later
    </button>
    <button @click="install()" class="flex-1 bg-brand-default hover:bg-brand-hover text-brand-on-brand font-semibold py-2 px-3 rounded-pill transition-colors text-sm">
      Install Now
    </button>
  </div>

  <div x-show="isIOS" class="bg-neutral-50 dark:bg-neutral-dark-50 rounded-sharp p-3 mt-1 flex flex-col gap-2">
    <div class="flex items-center gap-2 text-sm text-neutral-700 dark:text-neutral-dark-700">
      1. Tap <svg class="inline w-5 h-5 mx-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg> <b>Share</b> below
    </div>
    <div class="flex items-center gap-2 text-sm text-neutral-700 dark:text-neutral-dark-700">
      2. Select <span class="bg-white dark:bg-neutral-dark-100 border border-neutral-200 dark:border-neutral-dark-200 rounded px-1.5 py-0.5 text-xs font-semibold">Add to Home Screen</span>
    </div>
  </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('pwaInstallPrompt', () => ({
    showPrompt: false,
    deferredPrompt: null,
    isIOS: false,
    
    init() {
      // Don't show if already in standalone mode
      if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
        return;
      }
      
      // Detect iOS
      const ua = window.navigator.userAgent;
      this.isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
      
      // Don't show if dismissed previously (store in localStorage)
      if (localStorage.getItem('_npos_pwa_dismissed') === 'true') {
        return;
      }

      if (this.isIOS) {
        // Show iOS prompt after a short delay
        setTimeout(() => {
          this.showPrompt = true;
        }, 3000);
      } else {
        // Wait for beforeinstallprompt event for Android/Desktop
        window.addEventListener('beforeinstallprompt', (e) => {
          e.preventDefault();
          this.deferredPrompt = e;
          this.showPrompt = true;
        });
      }
    },
    
    async install() {
      if (!this.deferredPrompt) return;
      this.deferredPrompt.prompt();
      const { outcome } = await this.deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        this.showPrompt = false;
        this.deferredPrompt = null;
      }
    },
    
    dismiss() {
      this.showPrompt = false;
      localStorage.setItem('_npos_pwa_dismissed', 'true');
    }
  }));
});
</script>
