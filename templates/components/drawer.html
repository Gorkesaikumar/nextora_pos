<div x-data="{ open: false }"
     @open-drawer.window="if ($event.detail.id === '{{ drawer_id }}') open = true"
     @close-drawer.window="if ($event.detail.id === '{{ drawer_id }}') open = false"
     x-show="open"
     style="display: none;"
     class="fixed inset-0 z-40 flex justify-end"
     aria-labelledby="slide-over-title" role="dialog" aria-modal="true">
     
  <!-- Background Overlay -->
  <div x-show="open"
       @click="open = false"
       class="fixed inset-0 bg-black/50 transition-opacity duration-deliberate"
       x-transition:enter="ease-in-out duration-300"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="ease-in-out duration-300"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"></div>

  <!-- Drawer Panel -->
  <div x-show="open"
       @keydown.escape.window="open = false"
       class="relative w-screen max-w-md h-full bg-neutral-0 dark:bg-neutral-dark-100 shadow-overlay flex flex-col transition-transform duration-deliberate"
       x-transition:enter="transform transition ease-in-out duration-300 sm:duration-500"
       x-transition:enter-start="translate-x-full"
       x-transition:enter-end="translate-x-0"
       x-transition:leave="transform transition ease-in-out duration-300 sm:duration-500"
       x-transition:leave-start="translate-x-0"
       x-transition:leave-end="translate-x-full">
       
    <div class="px-6 py-4 border-b border-neutral-150 dark:border-neutral-dark-150 flex justify-between items-center bg-neutral-50 dark:bg-neutral-dark-50">
      <h2 class="text-heading-1 text-neutral-900 dark:text-neutral-dark-900" id="slide-over-title">{{ title|default:'Drawer Title' }}</h2>
      <button @click="open = false" type="button" class="text-neutral-400 hover:text-neutral-600 dark:hover:text-neutral-dark-600 focus:outline-none">
        <span class="sr-only">Close panel</span>
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Content -->
    <div class="flex-1 overflow-y-auto p-6">
      {% block drawer_body %}{% endblock %}
    </div>

    <!-- Footer -->
    <div class="px-6 py-4 border-t border-neutral-150 dark:border-neutral-dark-150 bg-neutral-50 dark:bg-neutral-dark-50 flex justify-end gap-3">
      {% block drawer_footer %}
        <button @click="open = false" class="btn border border-neutral-300 bg-neutral-0 text-neutral-800 hover:bg-neutral-50 dark:border-neutral-dark-200 dark:bg-neutral-dark-100 dark:text-neutral-dark-800 dark:hover:bg-neutral-dark-150 px-4 py-2">Close</button>
      {% endblock %}
    </div>
  </div>
</div>
