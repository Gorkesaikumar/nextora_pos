<div x-data="{ open: false, unreadCount: 3 }" class="relative">
  <!-- Trigger -->
  <button @click="open = !open" 
          @click.away="open = false"
          @keydown.escape.window="open = false"
          class="relative p-2 text-neutral-500 hover:text-neutral-800 dark:text-neutral-dark-500 dark:hover:text-neutral-dark-800 transition-colors focus:outline-none focus:ring-2 focus:ring-brand-default rounded-full"
          aria-label="Notifications">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
    <template x-if="unreadCount > 0">
      <span class="absolute top-1.5 right-1.5 block w-2.5 h-2.5 rounded-full bg-semantic-danger ring-2 ring-neutral-0 dark:ring-neutral-dark-100"></span>
    </template>
  </button>

  <!-- Dropdown Panel -->
  <div x-show="open" 
       style="display: none;"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 scale-95 translate-y-2"
       x-transition:enter-end="opacity-100 scale-100 translate-y-0"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100 scale-100 translate-y-0"
       x-transition:leave-end="opacity-0 scale-95 translate-y-2"
       class="absolute right-0 mt-2 w-80 bg-neutral-0 dark:bg-neutral-dark-100 rounded-card shadow-overlay border border-neutral-200 dark:border-neutral-dark-200 z-50 overflow-hidden origin-top-right">
    
    <div class="px-4 py-3 border-b border-neutral-150 dark:border-neutral-dark-150 flex justify-between items-center bg-neutral-50 dark:bg-neutral-dark-50">
      <h3 class="text-heading-3 text-neutral-900 dark:text-neutral-dark-900">Activity Stream</h3>
      <button @click="unreadCount = 0" class="text-caption text-brand-default hover:text-brand-hover dark:text-brand-on-dark transition-colors">Mark all read</button>
    </div>
    
    <div class="max-h-96 overflow-y-auto">
      <div class="divide-y divide-neutral-150 dark:divide-neutral-dark-150">
        
        <!-- Unread Notification -->
        <a href="#" class="block px-4 py-3 bg-brand-subtle/30 dark:bg-brand-default/5 hover:bg-neutral-50 dark:hover:bg-neutral-dark-150 transition-colors">
          <div class="flex gap-3">
            <div class="flex-shrink-0 mt-0.5 text-brand-default">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <div>
              <p class="text-body-strong text-neutral-900 dark:text-neutral-dark-900">New Web Order: #4052</p>
              <p class="text-caption text-neutral-600 dark:text-neutral-dark-600 mt-0.5">Alice Doe placed an order for pickup at 12:30 PM.</p>
              <p class="text-micro text-neutral-400 mt-1">2 mins ago</p>
            </div>
          </div>
        </a>

        <!-- Read Notification -->
        <a href="#" class="block px-4 py-3 hover:bg-neutral-50 dark:hover:bg-neutral-dark-150 transition-colors">
          <div class="flex gap-3">
            <div class="flex-shrink-0 mt-0.5 text-semantic-danger dark:text-semantic-danger-dark">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <div>
              <p class="text-body-strong text-neutral-900 dark:text-neutral-dark-900">Inventory Alert</p>
              <p class="text-caption text-neutral-600 dark:text-neutral-dark-600 mt-0.5">Truffle Oil is running low (2 bottles remaining).</p>
              <p class="text-micro text-neutral-400 mt-1">1 hour ago</p>
            </div>
          </div>
        </a>
        
      </div>
    </div>
    
    <div class="px-4 py-2 border-t border-neutral-150 dark:border-neutral-dark-150 text-center bg-neutral-50 dark:bg-neutral-dark-50">
      <a href="#" class="text-caption-strong text-neutral-600 hover:text-neutral-900 dark:text-neutral-dark-600 dark:hover:text-neutral-dark-900 transition-colors">View All Activity</a>
    </div>
  </div>
</div>
