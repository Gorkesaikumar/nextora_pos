<div class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
  <div class="bg-white dark:bg-neutral-800 rounded-xl shadow-lg border border-neutral-200 dark:border-neutral-700 max-w-sm w-full flex flex-col">
    <!-- Header -->
    <div class="px-6 py-4 border-b border-neutral-100 dark:border-neutral-700 flex justify-between items-center">
      <h3 class="text-md font-bold text-neutral-900 dark:text-white">
        Reset Passcode / PIN
      </h3>
      <button onclick="this.closest('.fixed').remove()" class="text-neutral-400 hover:text-neutral-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>

    <!-- Form -->
    <form hx-post="{% url 'employees:employee_reset_password' employee.id %}"
          hx-target="#dialog-container"
          class="p-6 space-y-4">
      {% csrf_token %}
      
      {% if error %}
        <div class="p-3 bg-red-50 text-red-700 text-xs rounded-lg">
          {{ error }}
        </div>
      {% endif %}

      <div>
        <label class="block text-xs font-semibold text-neutral-500 mb-1">New Password / PIN <span class="text-red-500">*</span></label>
        <input type="password" name="password" required class="form-input" placeholder="••••">
      </div>

      <div>
        <label class="block text-xs font-semibold text-neutral-500 mb-1">Confirm New Password / PIN <span class="text-red-500">*</span></label>
        <input type="password" name="confirm_password" required class="form-input" placeholder="••••">
      </div>

      <!-- Action Buttons -->
      <div class="border-t border-neutral-100 dark:border-neutral-700 pt-4 flex justify-end gap-2">
        <button type="button" onclick="this.closest('.fixed').remove()" class="px-4 py-2 bg-neutral-100 dark:bg-neutral-700 text-neutral-700 dark:text-neutral-200 rounded-lg text-xs font-semibold hover:bg-neutral-200">
          Cancel
        </button>
        <button type="submit" class="px-4 py-2 bg-red-600 text-white rounded-lg text-xs font-semibold hover:bg-red-700">
          Reset PIN
        </button>
      </div>
    </form>
  </div>
</div>
