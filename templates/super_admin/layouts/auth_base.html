{% load static %}<!doctype html>
<html lang="{{ LANGUAGE_CODE|default:'en' }}" class="h-full bg-slate-50">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Super Admin Login - Nextora POS{% endblock %}</title>

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Core Scripts -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              default: '#F5C519',
              50: '#fefce8',
              100: '#fdf9c3',
              200: '#fcef8b',
              300: '#fade47',
              400: '#f7cc16',
              500: '#eab308',
              600: '#ca8a04',
              700: '#a16207',
              800: '#854d0e',
              900: '#713f12',
            },
          }
        }
      }
    }
  </script>
</head>
<body class="h-full antialiased text-slate-900 bg-slate-50 selection:bg-brand-default selection:text-black">
  <div class="absolute top-6 left-6">
    <a href="{% url 'marketing:home' %}" class="inline-flex items-center gap-2 text-sm font-semibold text-slate-500 hover:text-slate-900 transition-colors">
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
      </svg>
      Back to Website
    </a>
  </div>
  <div class="min-h-full flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
      <div class="flex justify-center">
        <a href="/" class="flex flex-col items-center gap-2">
          <img class="h-16 w-auto" src="{% static 'img/logo-mark.png' %}" alt="Nextora Creations">
          <span class="text-xl font-extrabold tracking-widest text-slate-900">NEXTORA</span>
        </a>
      </div>
      <h2 class="mt-6 text-center text-2xl font-bold tracking-tight text-slate-900">
        {% block heading %}Sign in to Super Admin{% endblock %}
      </h2>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
      <div class="bg-white py-8 px-4 shadow-xl shadow-slate-200/50 sm:rounded-2xl sm:px-10 border border-slate-100">
        {% block content %}{% endblock %}
      </div>
    </div>
  </div>
</body>
</html>
