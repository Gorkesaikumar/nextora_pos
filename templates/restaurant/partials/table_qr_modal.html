<div class="modal-dialog max-w-sm w-full bg-neutral-0 dark:bg-neutral-dark-100 rounded-xl shadow-lg border border-neutral-200 dark:border-neutral-dark-200 flex flex-col pointer-events-auto" role="document">
  <div class="px-6 py-4 border-b border-neutral-150 dark:border-neutral-dark-150 flex justify-between items-center">
    <h3 class="text-heading-3 text-neutral-900 dark:text-neutral-dark-900">Table QR Code</h3>
    <button type="button" class="text-neutral-400 hover:text-neutral-600 dark:hover:text-neutral-dark-400 transition-colors" data-modal-dismiss>
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
    </button>
  </div>
  
  <div class="p-6 overflow-y-auto space-y-6 flex flex-col items-center justify-center text-center">
    <div>
      <h2 class="text-heading-2 font-mono text-neutral-900 dark:text-neutral-dark-900">Table {{ table.number }}</h2>
      <p class="text-caption text-neutral-500">{{ table.floor.name }} &bull; {{ table.capacity }} Pax</p>
    </div>
    
    <div class="bg-white p-4 rounded-xl border border-neutral-200 shadow-sm">
      <img src="{{ qr_image_url }}" alt="QR Code for Table {{ table.number }}" class="w-48 h-48 object-contain" />
    </div>
    
    <div>
      <p class="text-caption text-neutral-500 max-w-[250px] mx-auto">Customers can scan this code to browse the menu and order directly from this table.</p>
    </div>
  </div>
  
  <div class="px-6 py-4 border-t border-neutral-150 dark:border-neutral-dark-150 bg-neutral-50 dark:bg-neutral-dark-50 flex justify-end gap-3 rounded-b-xl">
    <button type="button" class="btn-secondary" data-modal-dismiss>Close</button>
    <a href="{{ qr_image_url }}" download="table_{{ table.number }}_qr.png" class="btn-primary flex items-center gap-2" target="_blank" rel="noopener">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
      Download
    </a>
  </div>
</div>
