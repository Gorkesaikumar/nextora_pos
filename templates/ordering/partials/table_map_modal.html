<!-- Overlay -->
<div id="table-map-overlay" class="modal-scrim">
  
  <!-- Modal Content -->
  <div class="modal modal--lg" style="height: 80vh;">
    
    <!-- Header -->
    <div class="modal__header">
      <h2 class="modal__title">Select Table</h2>
      <button class="modal__close" 
              style="background:none; border:none; cursor:pointer; padding: 4px; display: flex; align-items: center; justify-content: center; color: var(--forge-color-text-secondary);"
              onclick="document.getElementById('pos-modal-container').innerHTML = '';">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:24px; height:24px;">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <!-- Body / Map -->
    <div class="modal__body" style="background-color: var(--forge-color-surface-base);">
      <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 16px;">
        {% for table in tables %}
          <button class="btn"
                  style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; min-height: 100px; border: 2px solid {% if table.status == 'vacant' %}var(--forge-color-border-default, #e2e8f0){% elif table.status == 'occupied' %}#fef08a{% else %}#fee2e2{% endif %}; background-color: {% if table.status == 'vacant' %}var(--forge-color-surface-raised, #ffffff){% elif table.status == 'occupied' %}#fef9c3{% else %}#fee2e2{% endif %}; border-radius: var(--forge-radius-card); transition: all 0.2s; cursor: pointer;"
                  hx-post="{% url 'ordering:pos_select_table' table.id %}"
                  hx-target="#pos-cart-panel"
                  hx-swap="outerHTML"
                  onclick="setTimeout(() => { document.getElementById('pos-modal-container').innerHTML = ''; }, 300)">
            <div style="font-size: 1.5rem; font-family: monospace; font-weight: bold; color: var(--forge-color-text-primary); margin-bottom: 4px;">{{ table.number }}</div>
            <div style="font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: {% if table.status == 'vacant' %}var(--forge-color-text-secondary){% elif table.status == 'occupied' %}#a16207{% else %}#b91c1c{% endif %};">
              {{ table.get_status_display }}
            </div>
          </button>
        {% empty %}
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; grid-column: 1 / -1; padding: 48px; text-align: center; color: var(--forge-color-text-tertiary);">
          <p style="font-weight: 600;">No tables configured for this location.</p>
          <p style="font-size: 0.875rem; margin-top: 4px;">Add tables in the Management Dashboard.</p>
        </div>
        {% endfor %}
      </div>
    </div>

  </div>
</div>
