<div class="modal-scrim">
  <div class="modal modal--sm">
    <!-- Header -->
    <div class="modal__header" style="align-items: flex-start; gap: 16px; border-bottom: none; padding: 24px 24px 16px 24px;">
      <div style="width: 48px; height: 48px; border-radius: 50%; bg-color: rgba(239, 68, 68, 0.1); background-color: #fee2e2; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 24px; height: 24px; color: #dc2626;">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
      </div>
      <div style="flex: 1;">
        <h3 class="modal__title" style="font-size: 1.125rem; font-weight: bold; color: var(--forge-color-text-primary);">Payment Failed</h3>
        <p style="font-size: 0.875rem; color: var(--forge-color-text-secondary); margin-top: 4px;">{{ error_message }}</p>
      </div>
    </div>
    <!-- Footer actions -->
    <div class="modal__footer" style="border-top: none; padding: 0 24px 24px 24px;">
      <button onclick="document.getElementById('pos-modal-container').innerHTML = '';" 
              class="btn btn--primary" style="width: 100%; height: 44px; font-weight: bold; background-color: #dc2626; border-color: #dc2626;">
        Dismiss
      </button>
    </div>
  </div>
</div>
<script>
  if (window.Alpine) {
    Alpine.store('toast').show('Payment error: {{ error_message|escapejs }}', 'error');
  }
</script>
