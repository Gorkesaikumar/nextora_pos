<div id="pos-cart-panel" hx-swap-oob="true">
  {% include "ordering/partials/cart_panel.html" with active_order=None %}
</div>

<!-- Overlay -->
<div id="save-order-overlay" class="modal-scrim">
  
  <!-- Modal Content -->
  <div class="modal modal--sm" style="padding: 32px; align-items: center; text-align: center;">
    
    <!-- Success Icon -->
    <div style="width: 80px; height: 80px; border-radius: 50%; background-color: rgba(59, 130, 246, 0.1); display: flex; align-items: center; justify-content: center; margin-bottom: 24px; color: var(--forge-color-brand-default);">
       <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 40px; height: 40px;">
         <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
       </svg>
    </div>
    
    <h2 class="modal__title" style="font-size: 1.5rem; font-weight: bold; color: var(--forge-color-text-primary); margin-bottom: 8px;">Order Placed!</h2>
    <p style="font-size: 0.875rem; color: var(--forge-color-text-secondary); margin-bottom: 32px;">The order has been sent to the kitchen.</p>
    
    <button class="btn btn--primary" style="width: 100%; height: 48px; font-weight: bold;"
            onclick="document.getElementById('pos-modal-container').innerHTML = '';">
      Done
    </button>
  </div>
</div>
