<div id="whatsapp-modal-wrapper" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-neutral-900/60 backdrop-blur-sm" x-data="whatsappModal()" x-init="$watch('show', value => { if(!value) setTimeout(() => $el.remove(), 300) })" x-show="show" x-transition.opacity style="display: none;">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden" @click.outside="show = false" x-show="show" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95" x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100" x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100" x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95">
    
    <div class="px-6 py-4 border-b border-neutral-100 flex items-center justify-between bg-semantic-success-subtle/30">
      <h3 class="text-lg font-semibold text-neutral-900 flex items-center gap-2">
        <i data-lucide="message-circle" class="w-5 h-5 text-semantic-success"></i>
        Share via WhatsApp
      </h3>
      <button @click="show = false" class="text-neutral-400 hover:text-neutral-600 transition-colors">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
    </div>

    <form @submit.prevent="submitForm" class="p-6">
      
      <div class="mb-4">
        <label class="block text-sm font-medium text-neutral-700 mb-1">Customer Mobile Number</label>
        <div class="relative">
          <i data-lucide="smartphone" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-neutral-400"></i>
          <input type="tel" x-model="phoneNumber" class="w-full pl-9 pr-3 py-2 border border-neutral-300 rounded-md focus:outline-none focus:ring-2 focus:ring-semantic-success focus:border-transparent text-sm" placeholder="+91 9876543210" required>
        </div>
        <p class="text-xs text-neutral-500 mt-1">Include country code (e.g. +91)</p>
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-neutral-700 mb-1">Message</label>
        <textarea x-model="messageText" rows="7" class="w-full px-3 py-2 border border-neutral-300 rounded-md focus:outline-none focus:ring-2 focus:ring-semantic-success focus:border-transparent text-sm resize-none" required></textarea>
        <p class="text-xs text-neutral-500 mt-1">Feel free to customize the message before sending.</p>
      </div>
      
      <div x-show="error" class="mb-4 p-3 rounded-md bg-semantic-danger-subtle text-semantic-danger-dark text-sm" x-text="error" style="display: none;"></div>

      <div class="flex items-center justify-end gap-3 pt-4 border-t border-neutral-100">
        <button type="button" @click="show = false" class="px-4 py-2 text-sm font-medium text-neutral-600 bg-white border border-neutral-300 rounded-md hover:bg-neutral-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-neutral-500">
          Cancel
        </button>
        <button type="submit" :disabled="loading" class="px-4 py-2 text-sm font-medium text-white bg-semantic-success rounded-md hover:bg-semantic-success-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-semantic-success disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
          <span x-show="!loading">Send Message</span>
          <span x-show="loading">Generating Link...</span>
        </button>
      </div>
    </form>
  </div>
</div>

<script>
  function whatsappModal() {
    return {
      show: true,
      loading: false,
      error: '',
      phoneNumber: '{{ customer_phone|escapejs }}',
      messageText: `{{ default_message|escapejs }}`,
      
      async submitForm() {
        this.loading = true;
        this.error = '';
        try {
          const response = await fetch('{% url "billing:whatsapp_send" order.id %}', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({
              phone_number: this.phoneNumber,
              message_text: this.messageText
            })
          });
          
          const data = await response.json();
          if (data.status === 'success') {
            // Open the WhatsApp Web link in a new tab
            window.open(data.redirect_url, '_blank');
            this.show = false;
          } else {
            this.error = data.message || 'Failed to process WhatsApp request.';
          }
        } catch (err) {
          console.error(err);
          this.error = 'A network error occurred. Please try again.';
        } finally {
          this.loading = false;
        }
      }
    }
  }
  
  // Initialize lucide icons in the dynamically loaded modal
  if (typeof lucide !== 'undefined') {
    lucide.createIcons();
  }
</script>
